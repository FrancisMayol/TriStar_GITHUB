<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Employee Module</h2>
<button class="back-btn" onclick="location.href='index.html'">← Back</button>

<form onsubmit="addEmployee(event)">
<input id="name" placeholder="Name"><br><br>
<input id="role" placeholder="Role"><br><br>
<button>Add</button>
</form>

<table border="1">
<tbody id="table"></tbody>
</table>

<script src="core.js"></script>
<script>
function load(){
let data = getData("employee")
table.innerHTML=""

data.forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.EmployeeID}</td>
<td>${d.Name}</td>
<td>${d.Role}</td>
<td><button onclick="del(${d.EmployeeID})">Delete</button></td>
</tr>`
})
}

function addEmployee(e){
e.preventDefault()
let data = getData("employee")

data.push({
EmployeeID: generateID(data,"EmployeeID"),
Name: name.value,
Role: role.value
})

saveData("employee",data)
load()
}

function del(id){
saveData("employee", getData("employee").filter(d=>d.EmployeeID!=id))
load()
}

load()
</script>

</body>
</html>
